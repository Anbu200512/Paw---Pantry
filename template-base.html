<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #355E3B;
            --primary-hover: #2a4a2f;
            --accent: #F28C28;
            --accent-hover: #d9771a;
            --surface: #ffffff;
            --surface-hover: #f3f4f6;
            --surface-active: #e5e7eb;
            --surface-muted: #f9fafb;
            --text: #374151;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --border-muted: #f3f4f6;
            --footer-bg: #ffffff;
            --footer-text: #374151;
            --footer-text-muted: #6b7280;
            --page-bg: #f9fafb;
            --page-text: #2D2A26;
            --page-text-muted: #5C5852;
            --card-bg: #ffffff;
            --card-border: #e5e7eb;
            --section-alt-bg: #F8F5EE;
        }
        .dark {
            --primary: #4ade80;
            --primary-hover: #22c55e;
            --accent: #fbbf24;
            --accent-hover: #f59e0b;
            --surface: #111111;
            --surface-hover: #222222;
            --surface-active: #2a2a2a;
            --surface-muted: #000000;
            --text: #e5e7eb;
            --text-muted: #9ca3af;
            --border: #2a2a2a;
            --border-muted: #1a1a1a;
            --footer-bg: #000000;
            --footer-text: #e5e7eb;
            --footer-text-muted: #6b7280;
            --page-bg: #000000;
            --page-text: #e5e7eb;
            --page-text-muted: #9ca3af;
            --card-bg: #111111;
            --card-border: #222222;
            --section-alt-bg: #000000;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--page-bg);
            color: var(--page-text);
            transition: background-color 0.3s, color 0.3s;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
        }
        [dir="rtl"] [class*="space-x-"] > :not([hidden]) ~ :not([hidden]) {
            --tw-space-x-reverse: 1;
        }
        @keyframes footerShimmer {
            0% { background-position: 0% 0; }
            100% { background-position: 300% 0; }
        }
        #theme-bar button {
            transition: all 0.2s;
        }
    </style>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body class="text-[var(--page-text)]">

    <div id="navbar-placeholder"></div>
    <div id="footer-placeholder"></div>

    <script>
      (function () {
        var html = document.documentElement;

        if (localStorage.getItem('theme') === 'dark') {
          html.classList.add('dark');
        }
        if (localStorage.getItem('dir') === 'rtl') {
          html.dir = 'rtl';
        }

        var themeBarBtn = document.querySelector('#theme-bar [data-toggle="theme"]');
        var dirBarBtn = document.querySelector('#theme-bar [data-toggle="dir"]');

        if (themeBarBtn) {
          themeBarBtn.onclick = function () {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
          };
        }
        if (dirBarBtn) {
          dirBarBtn.onclick = function () {
            var cur = html.dir || 'ltr';
            html.dir = cur === 'rtl' ? 'ltr' : 'rtl';
            localStorage.setItem('dir', html.dir);
          };
        }
      })();
    </script>
    <script src="js/navbar.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
